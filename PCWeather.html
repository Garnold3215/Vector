<!DOCTYPE html>
<html>
<head>
  <title>RainViewer Weather Maps (Leaflet)</title>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />

  <link href="https://unpkg.com/leaflet/dist/leaflet.css" rel="stylesheet" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    li { list-style: none; display: inline-block; }
    /* Hide the settings */
    #settings { display: none; }
  </style>
</head>

<body>
  <ul id="settings" style="text-align:center; position:absolute; top:0; left:0; right:0; height:50px;">
    <li>
      <input type="radio" name="kind" checked="checked" onchange="setKind('radar')">Radar (Past + Future)
      <input type="radio" name="kind" onchange="setKind('satellite')">Infrared Satellite
    </li>

    <li><input type="button" onclick="stop(); showFrame(animationPosition - 1, true); return;" value="&lt;" /></li>
    <li><input type="button" onclick="playStop();" value="Play / Stop" /></li>
    <li><input type="button" onclick="stop(); showFrame(animationPosition + 1, true); return;" value="&gt;" /></li>

    <li>
      <select id="colors" onchange="setColors(); return;">
        <option value="0">Black and White Values</option>
        <option value="1">Original</option>
        <option value="2">Universal Blue</option>
        <option value="3">TITAN</option>
        <option value="4" selected="selected">The Weather Channel</option>
        <option value="5">Meteored</option>
        <option value="6">NEXRAD Level-III</option>
        <option value="7">RAINBOW @ SELEX-SI</option>
        <option value="8">Dark Sky</option>
        <option value="255">Raw Source</option>
      </select>
    </li>

    <li>WebP <input type="checkbox" id="webp" checked="checked" onchange="setWebp(); return;" /></li>
  </ul>

  <div id="timestamp" style="text-align:center; position:absolute; top:50px; left:0; right:0; height:30px;">
    Loading…
  </div>

  <div id="mapid" style="position:absolute; top:80px; left:0; bottom:0; right:0;"></div>

  <script>
    // --- Base map ---
    var map = L.map('mapid').setView([28.5, -81.74], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'Map data © <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
    }).addTo(map);

    // --- RainViewer radar animation state ---
    var apiData = {};
    var mapFrames = [];
    var lastPastFramePosition = -1;
    var radarLayers = [];

    var optionKind = 'radar';      // 'radar' or 'satellite'
    var optionTileSize = 256;      // 256 or 512
    var optionColorScheme = 4;     // 0..8 or 255
    var optionSmoothData = 1;      // 0 or 1
    var optionSnowColors = 1;      // 0 or 1
    var optionExtension = 'webp';  // 'webp' or 'png'

    var animationPosition = 0;
    var animationTimer = false;

    var loadingTilesCount = 0;
    var loadedTilesCount = 0;

    function startLoadingTile() {
      loadingTilesCount++;
    }
    function finishLoadingTile() {
      setTimeout(function () { loadedTilesCount++; }, 250);
    }
    function isTilesLoading() {
      return loadingTilesCount > loadedTilesCount;
    }

    // Load frames list from RainViewer
    var apiRequest = new XMLHttpRequest();
    apiRequest.open("GET", "https://api.rainviewer.com/public/weather-maps.json", true);
    apiRequest.onload = function () {
      apiData = JSON.parse(apiRequest.responseText);
      initialize(apiData, optionKind);
      play(); // auto-start animation
    };
    apiRequest.onerror = function () {
      document.getElementById("timestamp").innerHTML = "Failed to load RainViewer API.";
    };
    apiRequest.send();

    function initialize(api, kind) {
      // Remove existing layers
      for (var i in radarLayers) {
        if (radarLayers[i]) map.removeLayer(radarLayers[i]);
      }

      mapFrames = [];
      radarLayers = [];
      animationPosition = 0;
      loadingTilesCount = 0;
      loadedTilesCount = 0;

      if (!api) return;

      if (kind === 'satellite' && api.satellite && api.satellite.infrared) {
        mapFrames = api.satellite.infrared;
        lastPastFramePosition = mapFrames.length - 1;
        showFrame(lastPastFramePosition, true);
      } else if (api.radar && api.radar.past) {
        mapFrames = api.radar.past.slice();
        if (api.radar.nowcast) mapFrames = mapFrames.concat(api.radar.nowcast);

        lastPastFramePosition = api.radar.past.length - 1;
        showFrame(lastPastFramePosition, true);
      }
    }

    function addLayer(frame) {
      if (!frame || !frame.path) return;

      if (!radarLayers[frame.path]) {
        var colorScheme = (optionKind === 'satellite')
          ? (optionColorScheme == 255 ? 255 : 0)
          : optionColorScheme;

        var smooth = (optionKind === 'satellite') ? 0 : optionSmoothData;
        var snow = (optionKind === 'satellite') ? 0 : optionSnowColors;

        var url =
          apiData.host +
          frame.path +
          '/' + optionTileSize +
          '/{z}/{x}/{y}/' +
          colorScheme +
          '/' + smooth + '_' + snow +
          '.' + optionExtension;

        var source = new L.TileLayer(url, {
          tileSize: optionTileSize,
          opacity: 0,
          zIndex: frame.time
        });

        source.on('loading', startLoadingTile);
        source.on('load', finishLoadingTile);
        source.on('remove', finishLoadingTile);

        radarLayers[frame.path] = source;
      }

      if (!map.hasLayer(radarLayers[frame.path])) {
        map.addLayer(radarLayers[frame.path]);
      }
    }

    function changeRadarPosition(position, preloadOnly, force) {
      if (!mapFrames.length) return;

      while (position >= mapFrames.length) position -= mapFrames.length;
      while (position < 0) position += mapFrames.length;

      var currentFrame = mapFrames[animationPosition];
      var nextFrame = mapFrames[position];

      addLayer(nextFrame);

      if (preloadOnly || (isTilesLoading() && !force)) return;

      animationPosition = position;

      if (currentFrame && currentFrame.path && radarLayers[currentFrame.path]) {
        radarLayers[currentFrame.path].setOpacity(0);
      }

      // IMPORTANT: Leaflet opacity is 0.0 to 1.0 (NOT 0–100)
      radarLayers[nextFrame.path].setOpacity(1);

      var pastOrForecast = nextFrame.time > Date.now() / 1000 ? 'FORECAST' : 'PAST';
      document.getElementById("timestamp").innerHTML =
        pastOrForecast + ': ' + (new Date(nextFrame.time * 1000)).toString();
    }

    function showFrame(nextPosition, force) {
      var preloadingDirection = (nextPosition - animationPosition > 0) ? 1 : -1;

      changeRadarPosition(nextPosition, false, force);
      changeRadarPosition(nextPosition + preloadingDirection, true, false);
    }

    function stop() {
      if (animationTimer) {
        clearTimeout(animationTimer);
        animationTimer = false;
        return true;
      }
      return false;
    }

    function play() {
      showFrame(animationPosition + 1, false);
      animationTimer = setTimeout(play, 500);
    }

    function playStop() {
      if (!stop()) play();
    }

    // UI option handlers
    function setKind(kind) {
      optionKind = kind;
      initialize(apiData, optionKind);
      play();
    }

    function setColors() {
      var e = document.getElementById('colors');
      optionColorScheme = e.options[e.selectedIndex].value;
      initialize(apiData, optionKind);
      play();
    }

    function setWebp() {
      optionExtension = document.getElementById('webp').checked ? 'webp' : 'png';
      initialize(apiData, optionKind);
      play();
    }

    // Keyboard navigation
    document.onkeydown = function (e) {
      e = e || window.event;
      switch (e.which || e.keyCode) {
        case 37: // left
          stop();
          showFrame(animationPosition - 1, true);
          break;
        case 39: // right
          stop();
          showFrame(animationPosition + 1, true);
          break;
        default:
          return;
      }
      e.preventDefault();
      return false;
    };
  </script>
</body>
</html>
