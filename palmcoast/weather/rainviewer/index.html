<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RainViewer Radar (GitHub Pages)</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>

<body>
  <header class="bar">
    <div class="title">RainViewer Radar</div>

    <div class="controls">
      <button id="btnPlay" type="button">Play</button>
      <button id="btnPause" type="button">Pause</button>

      <label class="label">
        Speed
        <select id="speed">
          <option value="2000">2.0s</option>
          <option value="1500">1.5s</option>
          <option value="1200" selected>1.2s</option>
          <option value="900">0.9s</option>
        </select>
      </label>

      <label class="label">
        Opacity
        <input id="opacity" type="range" min="0" max="1" step="0.05" value="0.70" />
      </label>

      <div id="status" class="status">Loading…</div>
    </div>
  </header>

  <main id="map"></main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="assets/app.js"></script>
</body>
</html>
