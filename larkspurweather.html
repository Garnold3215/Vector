<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>RainViewer Weather Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #111;
        }

        /* Hidden settings */
        #settings {
            display: none;
        }

        #timestamp {
            text-align: center;
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            height: 30px;
            line-height: 30px;
            z-index: 1000;
            color: #111;
            background: rgba(255,255,255,0.85);
            font-size: 18px;
            font-weight: bold;
        }

        #mapid {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>

    <ul id="settings" style="text-align:center; position:absolute; top:0; left:0; right:0; height:50px; z-index:1000;">
        <li>
            <input type="button" onclick="stop(); showFrame(animationPosition - 1); return false;" value="&lt;" />
        </li>
        <li>
            <input type="button" onclick="playStop();" value="Play / Stop" />
        </li>
        <li>
            <input type="button" onclick="stop(); showFrame(animationPosition + 1); return false;" value="&gt;" />
        </li>
    </ul>

    <div id="timestamp">Loading radar...</div>
    <div id="mapid"></div>

    <script>
        // Keep map zoom within RainViewer supported range
        var map = L.map('mapid', {
            center: [39.24, -104.91],
            zoom: 7,
            minZoom: 2,
            maxZoom: 7,
            zoomControl: true
        });

        // Base map also limited to same max zoom so overlay stays clean
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Map data © OpenStreetMap contributors',
            maxZoom: 7
        }).addTo(map);

        var apiData = {};
        var mapFrames = [];
        var radarLayers = {};
        var animationPosition = 0;
        var animationTimer = null;

        var loadingTilesCount = 0;
        var loadedTilesCount = 0;

        // RainViewer options
        var optionTileSize = 256;
        var optionColorScheme = 2; // Universal Blue
        var optionSmoothData = 1;
        var optionSnowColors = 1;
        var optionExtension = 'png';

        function startLoadingTile() {
            loadingTilesCount++;
        }

        function finishLoadingTile() {
            setTimeout(function () {
                loadedTilesCount++;
            }, 250);
        }

        function isTilesLoading() {
            return loadingTilesCount > loadedTilesCount;
        }

        function initialize(api) {
            // Remove old layers
            for (var key in radarLayers) {
                if (map.hasLayer(radarLayers[key])) {
                    map.removeLayer(radarLayers[key]);
                }
            }

            radarLayers = {};
            mapFrames = [];
            animationPosition = 0;
            loadingTilesCount = 0;
            loadedTilesCount = 0;

            if (!api || !api.radar || !api.radar.past || !api.radar.past.length) {
                document.getElementById("timestamp").innerHTML = "No radar frames available";
                return;
            }

            mapFrames = api.radar.past.slice();

            // Show latest frame first
            animationPosition = mapFrames.length - 1;
            showFrame(animationPosition, true);
        }

        function addLayer(frame) {
            if (!frame || !frame.path) return;

            if (!radarLayers[frame.path]) {
                var tileUrl =
                    apiData.host +
                    frame.path + '/' +
                    optionTileSize + '/{z}/{x}/{y}/' +
                    optionColorScheme + '/' +
                    optionSmoothData + '_' + optionSnowColors + '.' + optionExtension;

                var source = new L.TileLayer(tileUrl, {
                    tileSize: 256,
                    opacity: 0,
                    zIndex: frame.time,
                    maxNativeZoom: 7,
                    maxZoom: 7,
                    noWrap: false
                });

                source.on('loading', startLoadingTile);
                source.on('load', finishLoadingTile);
                source.on('remove', finishLoadingTile);

                radarLayers[frame.path] = source;
            }

            if (!map.hasLayer(radarLayers[frame.path])) {
                map.addLayer(radarLayers[frame.path]);
            }
        }

        function changeRadarPosition(position, preloadOnly, force) {
            if (!mapFrames.length) return;

            while (position >= mapFrames.length) {
                position -= mapFrames.length;
            }

            while (position < 0) {
                position += mapFrames.length;
            }

            var currentFrame = mapFrames[animationPosition];
            var nextFrame = mapFrames[position];

            addLayer(nextFrame);

            if (preloadOnly || (isTilesLoading() && !force)) {
                return;
            }

            animationPosition = position;

            if (currentFrame && radarLayers[currentFrame.path]) {
                radarLayers[currentFrame.path].setOpacity(0);
            }

            if (nextFrame && radarLayers[nextFrame.path]) {
                radarLayers[nextFrame.path].setOpacity(1);
            }

            document.getElementById("timestamp").innerHTML =
                'PAST: ' + new Date(nextFrame.time * 1000).toString();
        }

        function showFrame(nextPosition, force) {
            if (!mapFrames.length) return;

            var preloadingDirection = (nextPosition - animationPosition > 0) ? 1 : -1;

            changeRadarPosition(nextPosition, false, force);
            changeRadarPosition(nextPosition + preloadingDirection, true, force);
        }

        function stop() {
            if (animationTimer) {
                clearTimeout(animationTimer);
                animationTimer = null;
                return true;
            }
            return false;
        }

        function play() {
            if (!mapFrames.length) return;
            showFrame(animationPosition + 1);
            animationTimer = setTimeout(play, 800);
        }

        function playStop() {
            if (!stop()) {
                play();
            }
        }

        function loadRadar() {
            var apiRequest = new XMLHttpRequest();
            apiRequest.open("GET", "https://api.rainviewer.com/public/weather-maps.json", true);

            apiRequest.onload = function () {
                try {
                    apiData = JSON.parse(apiRequest.responseText);
                    initialize(apiData);
                    play();
                } catch (err) {
                    document.getElementById("timestamp").innerHTML = "Error loading radar data";
                    console.error(err);
                }
            };

            apiRequest.onerror = function () {
                document.getElementById("timestamp").innerHTML = "Failed to load radar data";
            };

            apiRequest.send();
        }

        document.onkeydown = function (e) {
            e = e || window.event;

            switch (e.which || e.keyCode) {
                case 37: // left
                    stop();
                    showFrame(animationPosition - 1, true);
                    break;

                case 39: // right
                    stop();
                    showFrame(animationPosition + 1, true);
                    break;

                default:
                    return;
            }

            e.preventDefault();
            return false;
        };

        loadRadar();
    </script>
</body>
</html>
